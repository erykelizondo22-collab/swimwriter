<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Swim Master - Clean Cloud Build</title>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:system-ui;background:#f1f5f9;}
[v-cloak]{display:none;}
.ui{max-width:1100px;margin:auto;padding:20px;display:grid;grid-template-columns:2fr 1fr;gap:12px;}
.card{background:white;padding:14px;border-radius:12px;}
textarea,input{width:100%;padding:8px;margin-top:6px;border:1px solid #ddd;border-radius:8px;}
button{padding:8px;border-radius:8px;border:none;cursor:pointer;}
.side{background:#111;color:white;padding:12px;border-radius:12px;}
.set{border-bottom:1px solid #eee;padding:6px 0;display:flex;justify-content:space-between;}
.small{font-size:12px;opacity:0.7;}
</style>
</head>

<body>

<div id="app" v-cloak class="ui">

<!-- LEFT -->
<div class="card">

<h2 class="font-bold text-xl">Swim Master</h2>

<div v-if="!user" class="mt-3">
  <input v-model="email" placeholder="Enter email" />
  <button @click="login" class="bg-blue-600 text-white w-full mt-2">
    Send Login Link
  </button>
</div>

<div v-else class="text-sm mt-2">
  Logged in: <b>{{ user.email }}</b>
  <button @click="logout" class="ml-2 bg-black text-white px-2">Logout</button>
</div>

<hr class="my-3">

<input v-model="title" placeholder="Workout Title" />
<input v-model="group" placeholder="Group" />

<textarea v-model="input" rows="10"></textarea>

<button @click="saveWorkout" class="bg-green-600 text-white w-full mt-2">
Save Workout
</button>

</div>

<!-- RIGHT -->
<div class="side">

<h3 class="font-bold">Workouts</h3>

<div v-for="w in workouts" :key="w.id"
     class="mt-2 p-2 bg-white/10 rounded cursor-pointer"
     @click="loadWorkout(w)">

<div class="text-sm font-bold">{{ w.title }}</div>
<div class="small">{{ w.group_name }}</div>

</div>

</div>

</div>

<script>
const {createApp,ref,onMounted} = Vue;

const SUPABASE_URL = "https://nzrzcbxxqxwktocrmplg.supabase.co";
const SUPABASE_KEY = "sb_publishable_IENWSv_n2kZ1yR2-VmV8ew_pljwvLdt";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

createApp({
setup(){

const email = ref("");
const user = ref(null);

const title = ref("");
const group = ref("");
const input = ref("");

const workouts = ref([]);

// 🔐 LOGIN
async function login(){
  const { error } = await supabaseClient.auth.signInWithOtp({
    email: email.value,
    options: {
      emailRedirectTo: window.location.origin
    }
  });
  if(error) alert(error.message);
  else alert("Check your email");
}

// 🚪 LOGOUT
async function logout(){
  await supabaseClient.auth.signOut();
  user.value = null;
}

// 💾 SAVE
async function saveWorkout(){
  if(!user.value) return alert("Login first");

  const { error } = await supabaseClient.from("workouts").insert([{
    title: title.value,
    group_name: group.value,
    content: input.value,
    coach_name: user.value.email,
    team_id: "SOFLO",
    total_yards: 0
  }]);

  if(error) alert(error.message);
  else loadWorkouts();
}

// 📥 LOAD
async function loadWorkouts(){
  const { data } = await supabaseClient
    .from("workouts")
    .select("*")
    .order("created_at",{ascending:false});

  workouts.value = data || [];
}

// 📂 LOAD ONE
function loadWorkout(w){
  title.value = w.title;
  group.value = w.group_name;
  input.value = w.content;
}

// 🔁 SESSION
onMounted(async () => {
  const { data } = await supabaseClient.auth.getSession();
  user.value = data.session?.user || null;

  supabaseClient.auth.onAuthStateChange((_, session) => {
    user.value = session?.user || null;
    loadWorkouts();
  });

  loadWorkouts();
});

return {
email,user,title,group,input,
workouts,
login,logout,saveWorkout,loadWorkout
};

}
}).mount("#app");
</script>

</body>
</html>
