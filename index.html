<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swim Engine Pro</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        @media print { .no-print { display: none !important; } body { background: white !important; color: black !important; padding: 0; } .set-card { border: 1px solid #eee !important; color: black !important; shadow: none !important; } }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 p-4 font-sans antialiased">
    <div id="app" class="max-w-xl mx-auto pb-24">
        
        <nav class="flex justify-between items-center mb-6 no-print border-b border-slate-800 pb-2">
            <div class="flex space-x-5">
                <button @click="view = 'editor'" :class="{'tab-active': view === 'editor'}" class="pb-2 font-black text-[10px] uppercase tracking-widest">Editor</button>
                <button @click="view = 'history'" :class="{'tab-active': view === 'history'}" class="pb-2 font-black text-[10px] uppercase tracking-widest">Workouts</button>
                <button @click="view = 'season'" :class="{'tab-active': view === 'season'}" class="pb-2 font-black text-[10px] uppercase tracking-widest text-emerald-500 font-bold">Season Plan</button>
            </div>
            <div class="text-[10px] font-bold text-slate-600 uppercase">{{ currentPhase }}</div>
        </nav>

        <div v-if="view === 'editor'">
            <div class="bg-[#1e293b] p-5 rounded-3xl mb-6 border border-slate-700/50 shadow-2xl">
                <div class="flex justify-between items-start mb-4">
                    <input v-model="workoutName" class="bg-transparent text-xl font-black text-blue-500 outline-none w-full uppercase" placeholder="SESSION NAME">
                    <div class="text-right shrink-0">
                        <div class="text-2xl font-mono font-bold text-emerald-400">{{ totalYds }}y</div>
                        <div class="text-[10px] font-black text-blue-400 uppercase italic">Finish: {{ practiceEndTime }}</div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 no-print">
                    <div class="flex flex-col">
                        <label class="text-[8px] font-black text-slate-500 uppercase mb-1">Start Time</label>
                        <input type="time" v-model="startTime" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl p-2 text-sm text-blue-300 outline-none">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-[8px] font-black text-emerald-600 uppercase mb-1 text-center">Base Interval</label>
                        <select v-model="baseInterval" class="w-full bg-[#0f172a] border border-slate-700 rounded-xl p-2 text-sm text-emerald-400 outline-none">
                            <option v-for="t in customIntervals" :value="t">{{ t }}</option>
                        </select>
                    </div>
                </div>
            </div>

            <textarea v-model="input" class="w-full h-48 bg-[#1e293b] border border-slate-700 p-4 rounded-3xl font-mono text-sm mb-4 outline-none no-print shadow-inner" placeholder="10x100"></textarea>
            
            <div class="grid grid-cols-2 gap-3 no-print mb-8">
                <button @click="saveWorkout" class="bg-blue-600 p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-all">Save Workout</button>
                <button @click="printWorkout" class="bg-emerald-600 p-4 rounded-2xl font-black text-[10px] uppercase tracking-widest active:scale-95 transition-all">Print / PDF</button>
            </div>

            <div class="space-y-2">
                <div v-for="set in timeline" class="set-card bg-[#1e293b]/40 p-4 rounded-2xl flex justify-between items-center border border-slate-800">
                    <div class="flex items-center gap-4">
                        <div class="text-[10px] font-mono text-slate-500 w-16 text-center border-r border-slate-800 pr-2">{{ set.start }}</div>
                        <div class="font-bold text-lg leading-none">
                            {{ set.qty }} x {{ set.dist }} 
                            <span class="block text-[10px] mt-1 uppercase" :class="set.isDefault ? 'text-emerald-500 font-bold' : 'text-slate-500'">{{ set.isDefault ? 'Base' : '@' }} {{ set.interval }}</span>
                        </div>
                    </div>
                    <div class="text-right font-mono text-sm text-slate-400">{{ set.duration }}m</div>
                </div>
            </div>
        </div>

        <div v-if="view === 'history'" class="space-y-4">
            <div v-for="(w, idx) in history" :key="idx" class="bg-[#1e293b] p-5 rounded-2xl flex justify-between items-center border border-slate-800">
                <div><div class="font-black text-blue-400 uppercase tracking-tight">{{ w.name || 'Untitled' }}</div><div class="text-[10px] text-slate-500 font-bold uppercase mt-1">{{ w.date }} • {{ w.yardage }} yds</div></div>
                <div class="flex gap-2"><button @click="loadWorkout(w)" class="bg-slate-700 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Load</button><button @click="deleteWorkout(idx)" class="bg-red-900/30 text-red-500 px-3 py-2 rounded-xl text-[10px] font-black">X</button></div>
            </div>
        </div>

        <div v-if="view === 'season'" class="space-y-6 text-center">
            <div v-for="p in phases" class="p-5 rounded-3xl border-l-8 cursor-pointer" :class="currentPhase === p.name ? 'bg-blue-900/30 border-blue-500' : 'bg-slate-800 border-slate-700 opacity-50'" @click="currentPhase = p.name">
                <div class="flex justify-between items-start mb-2"><span class="font-black uppercase tracking-tight text-lg">{{ p.name }}</span><span class="text-[10px] font-bold text-slate-400 italic">{{ p.duration }}</span></div>
                <p class="text-xs text-slate-400 leading-relaxed italic">{{ p.focus }}</p>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue
        createApp({
            setup() {
                const view = ref('editor');
                const workoutName = ref('');
                const input = ref("10x100\n8x50");
                const startTime = ref("17:30"); // 5:30 PM
                const baseInterval = ref("1:30");
                const currentPhase = ref('Aerobic Base');
                const history = ref([]);

                const customIntervals = computed(() => {
                    const times = [];
                    for (let sec = 20; sec <= 300; sec += 5) {
                        const m = Math.floor(sec / 60);
                        const s = sec % 60;
                        times.push(`${m}:${s.toString().padStart(2, '0')}`);
                    }
                    return times;
                });

                const phases = [{ name: 'Aerobic Base', duration: 'Weeks 1-8', focus: 'High volume engine building.' }, { name: 'Lactate / SP', duration: 'Weeks 9-12', focus: 'Race pace and intensity.' }, { name: 'Taper Phase', duration: 'Championship', focus: 'Recovery and sharpening.' }];

                const timeline = computed(() => {
                    let cur = timeToSeconds(startTime.value || "00:00");
                    return input.value.split('\n').filter(l => l.toLowerCase().includes('x')).map(line => {
                        const qty = parseInt(line.match(/(\d+)\s*x/)?.[1] || 0);
                        const dist = parseInt(line.match(/x\s*(\d+)/)?.[1] || 0);
                        const over = line.match(/[@|on]\s*(\d*:?\d+)/)?.[1];
                        const interval = over || baseInterval.value;
                        const durationSec = qty * intervalToSeconds(interval);
                        const start = secondsToTime(cur);
                        cur += durationSec;
                        return { start, qty, dist, interval, isDefault: !over, lineYds: qty * dist, duration: Math.floor(durationSec / 60) }
                    });
                });

                const totalYds = computed(() => timeline.value.reduce((a, s) => a + s.lineYds, 0));
                const practiceEndTime = computed(() => {
                    if(!timeline.value.length) return secondsToTime(timeToSeconds(startTime.value || "00:00"));
                    const last = timeline.value[timeline.value.length-1];
                    const endSec = timeToSeconds(last.start) + (last.duration * 60);
                    return secondsToTime(endSec);
                });

                const saveWorkout = () => { history.value.unshift({ name: workoutName.value || 'New Session', content: input.value, yardage: totalYds.value, date: new Date().toLocaleDateString() }); localStorage.setItem('swimHistory', JSON.stringify(history.value)); workoutName.value = ''; alert("Saved!"); };
                const printWorkout = () => { window.print(); };
                const loadWorkout = (w) => { workoutName.value = w.name; input.value = w.content; view.value = 'editor'; };
                const deleteWorkout = (idx) => { history.value.splice(idx, 1); localStorage.setItem('swimHistory', JSON.stringify(history.value)); };
                
                onMounted(() => { const h = localStorage.getItem('swimHistory'); if (h) history.value = JSON.parse(h); });

                function intervalToSeconds(s) { 
                    const p = s.split(':'); 
                    const m = p.length > 1 ? parseInt(p[0]) : 0;
                    const sc = p.length > 1 ? parseInt(p[1]) : parseInt(p[0]);
                    return (m * 60) + (sc || 0);
                }
                function timeToSeconds(t) { if(!t) return 0; const [h, m] = t.split(':').map(Number); return (h * 3600) + (m * 60); }
                function secondsToTime(s) { 
                    if(isNaN(s)) return "00:00";
                    let h = Math.floor(s / 3600) % 24; 
                    let m = Math.floor((s % 3600) / 60); 
                    const ap = h >= 12 ? 'PM' : 'AM'; 
                    h = h % 12 || 12; 
                    return `${h}:${m.toString().padStart(2, '0')} ${ap}`; 
                }

                return { view, workoutName, input, startTime, baseInterval, history, customIntervals, timeline, totalYds, practiceEndTime, saveWorkout, printWorkout, loadWorkout, deleteWorkout, phases, currentPhase }
            }
        }).mount('#app')
    </script>
</body>
</html>
    <script>
        const { createApp, ref, computed, onMounted } = Vue
        createApp({
            setup() {
                const view = ref('editor');
                const workoutName = ref('');
                const input = ref("10x100\n8x50\n1x500 @ 8:00");
                const startTime = ref("05:30");
                const baseInterval = ref("1:30");
                const currentPhase = ref('Aerobic Base');
                const history = ref([]);

                // NEW: Custom 5-second interval generator
                const customIntervals = computed(() => {
                    const times = [];
                    for (let sec = 20; sec <= 120; sec += 5) {
                        const m = Math.floor(sec / 60);
                        const s = sec % 60;
                        times.push(`${m}:${s.toString().padStart(2, '0')}`);
                    }
                    return times;
                });

                const phases = [
                    { name: 'Aerobic Base', duration: 'Weeks 1-8', focus: 'High volume, technique focus, building the engine.' },
                    { name: 'Lactate / SP', duration: 'Weeks 9-12', focus: 'Threshold maintenance and race pace speed.' },
                    { name: 'Taper Phase', duration: 'Championship', focus: 'Low volume, high intensity, full recovery.' }
                ];

                const timeline = computed(() => {
                    let cur = timeToSeconds(startTime.value);
                    return input.value.split('\n').filter(l => l.toLowerCase().includes('x')).map(line => {
                        const qty = parseInt(line.match(/(\d+)\s*x/)?.[1] || 0);
                        const dist = parseInt(line.match(/x\s*(\d+)/)?.[1] || 0);
                        const over = line.match(/[@|on]\s*(\d*:?\d+)/)?.[1];
                        const interval = over || baseInterval.value;
                        const durationSec = qty * intervalToSeconds(interval);
                        const start = secondsToTime(cur);
                        cur += durationSec;
                        return { start, qty, dist, interval, isDefault: !over, lineYds: qty * dist, duration: Math.floor(durationSec / 60) }
                    });
                });

                const totalYds = computed(() => timeline.value.reduce((a, s) => a + s.lineYds, 0));
                const practiceEndTime = computed(() => {
                    if(!timeline.value.length) return secondsToTime(timeToSeconds(startTime.value));
                    const last = timeline.value[timeline.value.length-1];
                    const endSec = timeToSeconds(last.start) + (last.duration * 60);
                    return secondsToTime(endSec);
                });

                const saveWorkout = () => {
                    history.value.unshift({ name: workoutName.value || 'New Session', content: input.value, yardage: totalYds.value, date: new Date().toLocaleDateString() });
                    localStorage.setItem('swimHistory', JSON.stringify(history.value));
                    workoutName.value = ''; alert("Stored!");
                };
                const loadWorkout = (w) => { workoutName.value = w.name; input.value = w.content; view.value = 'editor'; };
                const deleteWorkout = (idx) => { history.value.splice(idx, 1); localStorage.setItem('swimHistory', JSON.stringify(history.value)); };
                
                onMounted(() => { const h = localStorage.getItem('swimHistory'); if (h) history.value = JSON.parse(h); });

                function intervalToSeconds(s) { 
                    const p = s.split(':'); 
                    if (p.length > 1) return (parseInt(p[0]) * 60) + parseInt(p[1]);
                    if (s.startsWith(':')) return parseInt(s.substring(1));
                    return parseInt(s); 
                }
                function timeToSeconds(t) { const [h, m] = t.split(':').map(Number); return (h * 3600) + (m * 60); }
                function secondsToTime(s) { 
                    let h = Math.floor(s / 3600) % 24; 
                    let m = Math.floor((s % 3600) / 60); 
                    const ap = h >= 12 ? 'PM' : 'AM'; 
                    h = h % 12 || 12; 
                    return `${h}:${m.toString().padStart(2, '0')} ${ap}`; 
                }

                return { view, workoutName, input, startTime, baseInterval, history, customIntervals, timeline, totalYds, practiceEndTime, saveWorkout, loadWorkout, deleteWorkout, phases, currentPhase }
            }
        }).mount('#app')
    </script>
</body>
</html>
