<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swim Master v18</title>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
[v-cloak]{display:none!important;}
:root{--fit:0.8;--m-lock:1in;}

body{background:#f1f5f9;font-family:Inter,system-ui;}

#render-sheet{
    width:8.5in;
    min-height:11in;
    padding:var(--m-lock);
    margin:2rem auto;
    background:#fff;
    box-shadow:0 40px 100px rgba(0,0,0,.1);
    font-size:calc(16px * var(--fit));
    overflow:hidden;
}

@media print{
    .no-print{display:none!important;}
    @page{margin:0;}
    #render-sheet{
        margin:0;
        box-shadow:none;
        position:absolute;
        top:0;
        left:0;
    }
}

.h-main{font-size:4em;font-weight:900;}
.s-head{font-weight:900;border-bottom:4px solid #000;margin-top:1.5em;}
.set-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #eee;}
.qty-text{font-size:2em;font-weight:900;}
.clk{font-family:monospace;font-weight:900;}
</style>
</head>

<body>
<div id="app" v-cloak :style="{'--fit':fit}">

<!-- DASHBOARD -->
<div class="no-print max-w-7xl mx-auto p-6 grid grid-cols-3 gap-6">

<!-- LEFT: EDITOR -->
<div class="col-span-2 space-y-4">

<input v-model="title" class="text-3xl font-black w-full border-b p-2">

<div class="grid grid-cols-4 gap-3">
<input v-model="team" placeholder="Team" class="border p-2">
<input v-model="group" placeholder="Group" class="border p-2">
<input type="time" v-model="start">
<select v-model="base" class="border p-2">
<option>1:15</option><option>1:20</option><option>1:30</option>
<option>1:40</option><option>1:45</option><option>2:00</option>
</select>
</div>

<div class="grid grid-cols-3 gap-3 items-center">
<input v-model.number="targetMinutes" placeholder="Target Minutes" class="border p-2">

<div>
<label class="text-xs font-bold">Scale {{Math.round(fit*100)}}%</label>
<input type="range" min="0.5" max="1.1" step="0.01" v-model="fit">
</div>

<label class="flex items-center gap-2 text-sm font-bold">
<input type="checkbox" v-model="autoFitEnabled">
Auto Fit
</label>
</div>

<textarea v-model="input" class="w-full h-[500px] border p-4 font-mono"></textarea>

<button @click="print" class="bg-black text-white p-4 w-full">PRINT</button>

</div>

<!-- RIGHT: LIVE BREAKDOWN -->
<div class="bg-black text-white rounded-2xl p-6 space-y-6 h-fit sticky top-6">

<div class="text-center">
<div class="text-xs opacity-50 uppercase">Total Volume</div>
<div class="text-6xl font-black">{{yards}}y</div>
<div class="text-xs mt-1">{{duration}} min</div>
</div>

<div class="border-t border-white/20 pt-4 space-y-4">

<div v-for="sec in parsed" :key="sec.title">

<div class="flex justify-between text-xs font-black uppercase opacity-70">
<span>{{sec.title}}</span>
<span>{{sec.y}}y</span>
</div>

<div class="mt-2 space-y-1">

<div v-for="b in sec.blocks">
<div v-for="s in b.sets" class="flex justify-between text-[11px]">

<span v-if="!s.rest">
{{s.q}}x{{s.d}}
</span>

<span v-else class="opacity-50">REST</span>

<span class="font-bold">
{{s.run}}y
</span>

</div>
</div>

</div>
</div>

</div>

</div>
</div>

<!-- PRINT SHEET -->
<div id="render-sheet">

<div class="flex justify-between border-b-4 pb-4 mb-6">
<div>
<div class="h-main">{{title}}</div>
<div class="text-xs font-bold">{{team}} — {{group}}</div>
</div>

<div class="text-right">
<div class="text-5xl font-black">{{yards}}y</div>
<div class="text-xs">{{duration}} min</div>
</div>
</div>

<div v-for="sec in parsed">
<div class="s-head flex justify-between">
<span>{{sec.title}}</span>
<span>{{sec.y}}y</span>
</div>

<div v-for="b in sec.blocks">

<div v-if="b.rounds>1" class="text-xs font-bold mb-1">
{{b.rounds}} ROUNDS
</div>

<div v-for="s in b.sets" class="set-row">

<div>
<div v-if="s.rest" class="bg-black text-white px-2 py-1 inline-block">
REST {{s.label}}
</div>

<div v-else>
<div>
<span class="qty-text">{{s.q}}x{{s.d}}</span> @ {{s.p}}
</div>
<div class="text-xs">{{s.note}}</div>
</div>
</div>

<div class="text-right">
<div class="clk">{{s.time}}</div>
<div class="text-xs font-bold opacity-50">{{s.run}}y</div>
</div>

</div>
</div>
</div>

</div>

<script>
const {createApp,ref,computed,nextTick}=Vue;

createApp({
setup(){

const title=ref("SOFLO SESSION");
const team=ref("TEAM");
const group=ref("GROUP");
const start=ref("17:45");
const base=ref("1:45");
const fit=ref(.8);
const autoFitEnabled=ref(true);
const targetMinutes=ref(90);

const input=ref(`WARMUP:
4x100 free
4x50 kick
4:00

MAIN:
2x
4x200 @ 2:40
4x100 @ 1:20
`);

function parseTime(t){
let [m,s]=t.split(':').map(Number);
return m*60+s;
}

function clock(sec){
let h24=Math.floor(sec/3600);
let h=h24%12||12;
let m=Math.floor(sec%3600/60);
let s=sec%60;
let ampm=h24>=12?'pm':'am';
return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')} ${ampm}`;
}

const parsed=computed(()=>{
let baseSec=parseTime(base.value);
let cur={title:"PRACTICE",blocks:[],y:0};
let out=[];
let y=0;

let [sh,sm]=start.value.split(':').map(Number);
let t=sh*3600+sm*60;

const lines=input.value.split('\n').map(l=>l.trim()).filter(Boolean);

for(let i=0;i<lines.length;i++){
let l=lines[i];

if(l.endsWith(':')){
if(cur.blocks.length) out.push(cur);
cur={title:l.slice(0,-1),blocks:[],y:0};
continue;
}

let round=l.match(/^(\d+)x$/i);
if(round){
let r=+round[1];
let block={rounds:r,sets:[]};
i++;

while(i<lines.length&&!lines[i].endsWith(':')){
let s=parseSet(lines[i],baseSec);
if(!s){console.warn("Bad:",lines[i]);i++;continue;}

for(let k=0;k<r;k++){
y+=s.q*s.d;
cur.y+=s.q*s.d;
t+=s.q*s.dur;
}

s.time=clock(t);
s.run=y;

block.sets.push(s);
i++;
}

i--;
cur.blocks.push(block);
continue;
}

let s=parseSet(l,baseSec);
if(!s){console.warn("Bad:",l);continue;}

y+=s.q*s.d;
cur.y+=s.q*s.d;
t+=s.q*s.dur;

s.time=clock(t);
s.run=y;

cur.blocks.push({rounds:1,sets:[s]});
}

out.push(cur);

nextTick(()=>{
if(autoFitEnabled.value) autoFit();
});

return out;
});

function parseSet(str,baseSec){

let rest=str.match(/^(\d+):(\d+)$/);
if(rest){
return {rest:true,label:str,q:0,d:0,dur:parseTime(str)};
}

let m=str.match(/(\d+)x(\d+)/i);
let q=1,d=0;

if(m){q=+m[1];d=+m[2];}
else if(/^\d+/.test(str)){d=parseInt(str);}
else return null;

let int=str.match(/(?:@|on|at)\s*(\d+):(\d+)/i);

let dur=int
? parseTime(int[1]+":"+int[2])
: Math.round(d/100*baseSec);

let pace=int
? `${int[1]}:${int[2]}`
: `${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}`;

let note=str
.replace(/(\d+)x(\d+)/i,'')
.replace(/^\d+/,'')
.replace(/(?:@|on|at)\s*(\d+):(\d+)/i,'')
.trim();

return {rest:false,q,d,dur,p:pace,note};
}

function autoFit(){
const el=document.getElementById('render-sheet');
if(!el)return;

let f=1;
fit.value=f;

const max=11*96;

while(el.scrollHeight>max&&f>.5){
f-=.01;
fit.value=f;
}
}

const yards=computed(()=>parsed.value.reduce((a,s)=>a+s.y,0));

const duration=computed(()=>{
let total=0;
parsed.value.forEach(sec=>{
sec.blocks.forEach(b=>{
b.sets.forEach(s=>{
total+=s.dur*s.q;
});
});
});
return Math.round(total/60);
});

function print(){window.print();}

return{
title,team,group,start,base,fit,input,
parsed,yards,print,duration,
targetMinutes,autoFitEnabled
};
}
}).mount('#app');
</script>
</body>
</html>
