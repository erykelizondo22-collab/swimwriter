<script>
const {createApp,ref,computed,onMounted}=Vue;

// ✅ FIXED SUPABASE INIT
const SUPABASE_URL = 'https://nzrzcbxxqxwktocrmplg.supabase.co';
const SUPABASE_KEY = 'sb_publishable_IENWSv_n2kZ1yR2-VmV8ew_pljwvLdt';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// TIME HELPERS
function parseClockTime(t){ if(!t) return 0; let [h,m]=t.split(":").map(Number); return h*3600 + m*60; }
function parseTime(t){ if(!t) return 0; let [m,s]=t.split(":").map(Number); return m*60+s; }
function clock(sec){
  let h24=Math.floor(sec/3600);
  let m=Math.floor(sec%3600/60);
  let h=h24%12||12;
  let ap=h24>=12?"pm":"am";
  return `${h}:${m.toString().padStart(2,"0")} ${ap}`;
}
function isRestTime(str){ return /^\d+:\d{2}$/.test(str.trim()); }

createApp({
setup(){

const title=ref("SOFLO SESSION");
const team=ref("SOFLO");
const group=ref("SENIOR ELITE");
const start=ref("17:45");
const base=ref("1:30");
const fit=ref(0.75);

const input=ref(`Warmup:
400 Free
300 Kick
200 Pull

Main Set:
2x
4x50 @ 1:00 Sprint
100 @ 2:00 Easy`);

const cloudWorkouts=ref([]);

// ✅ PARSER (FULLY FIXED)
const parsed=computed(()=>{

if(!start.value||!base.value) return [];

let baseSec=parseTime(base.value);
let out=[];
let cur={title:"PRACTICE",y:0,blocks:[],startTimeRaw:0};

let y=0;
let t=parseClockTime(start.value);
cur.startTimeRaw=t;

let lines=input.value.split("\n").map(l=>l.trim()).filter(Boolean);

for(let i=0;i<lines.length;i++){

let l=lines[i];

// SECTION
if(l.endsWith(":")){
  if(cur.blocks.length) out.push(cur);
  cur={title:l.slice(0,-1),y:0,blocks:[],startTimeRaw:t};
  continue;
}

// ROUND BLOCK
let r=l.match(/^(\d+)x$/i);
if(r){
  let rep=+r[1];
  let block={rep,sets:[]};
  i++;

  while(i<lines.length && !lines[i].endsWith(":")){
    let s=parseLine(lines[i],baseSec);
    if(!s){i++;continue;}

    for(let k=0;k<rep;k++){

      let inst={...s};

      if(!inst.rest){
        y+=inst.q*inst.d;
        cur.y+=inst.q*inst.d;
        inst.start=t;
        t+=inst.dur*inst.q;
      } else {
        inst.start=t;
        t+=inst.dur;
      }

      inst.run=y;
      block.sets.push(inst);
    }

    i++;
  }

  i--;
  cur.blocks.push(block);
  continue;
}

// SINGLE LINE
let s=parseLine(l,baseSec);
if(!s) continue;

let inst={...s};

if(!inst.rest){
  y+=inst.q*inst.d;
  cur.y+=inst.q*inst.d;
  inst.start=t;
  t+=inst.dur*inst.q;
} else {
  inst.start=t;
  t+=inst.dur;
}

inst.run=y;
cur.blocks.push({rep:1,sets:[inst]});
}

out.push(cur);
return out;
});

// ✅ PARSE LINE WITH NOTES
function parseLine(str,baseSec){

if(isRestTime(str)){
  return {rest:true,q:1,d:0,dur:parseTime(str),label:str};
}

let m=str.match(/(\d+)x(\d+)/i);
let q=1,d=0;

if(m){ q=+m[1]; d=+m[2]; }
else if(/^\d+/.test(str)){ d=parseInt(str); }
else return null;

let i=str.match(/(?:@|on)\s*(\d+):(\d+)/);
let dur=i?parseTime(i[1]+":"+i[2]):Math.round(d/100*baseSec);

// KEEP NOTES
let label=str.replace(/(\d+x\d+)|(^\d+)|(@|on)\s*\d+:\d{2}/gi,"").trim();

let pace=`${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,"0")}`;

return {rest:false,q,d,dur,p:pace,label};
}

// ✅ TOTALS (FIXED)
const yards=computed(()=>parsed.value.reduce((a,s)=>a+s.y,0));

const duration=computed(()=>{
let t=0;
parsed.value.forEach(sec=>{
sec.blocks.forEach(b=>{
b.sets.forEach(s=>{
t+=s.dur*(s.q||1);
});
});
});
return Math.round(t/60);
});

// ✅ SHARE (REAL)
function copyLink(){
let data={
  title:title.value,
  team:team.value,
  group:group.value,
  start:start.value,
  base:base.value,
  input:input.value
};
let encoded=btoa(JSON.stringify(data));
let url=location.origin+location.pathname+"?w="+encoded;
navigator.clipboard.writeText(url);
alert("Link copied!");
}

// ✅ CLOUD SAVE
async function saveToCloud(){
  const { error } = await supabaseClient.from('workouts').insert([{
    team_id:'SOFLO',
    coach_name:'Coach Eryk',
    title:title.value,
    group:group.value,
    content:input.value,
    total_yards:yards.value
  }]);

  if(error) alert(error.message);
  else{
    alert("Synced!");
    loadCloudData();
  }
}

// ✅ LOAD CLOUD
async function loadCloudData(){
  const { data } = await supabaseClient.from('workouts')
    .select('*')
    .eq('team_id','SOFLO')
    .order('created_at',{ascending:false})
    .limit(10);

  if(data) cloudWorkouts.value=data;
}

function loadWorkout(w){
  title.value=w.title;
  group.value=w.group;
  input.value=w.content;
}

onMounted(loadCloudData);

return{
title,team,group,start,base,fit,input,
parsed,yards,duration,cloudWorkouts,
formatTime:clock,
copyLink,saveToCloud,loadWorkout,loadCloudData
};
}
}).mount("#app");
</script>
