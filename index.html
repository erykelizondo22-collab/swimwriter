<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swim Master - Email Auth + Sync</title>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:system-ui;background:#f1f5f9;}
[v-cloak]{display:none;}
.ui{max-width:1000px;margin:auto;padding:20px;}
.card{background:white;padding:16px;border-radius:12px;margin-bottom:12px;}
textarea,input{width:100%;padding:8px;margin-top:6px;border:1px solid #ddd;border-radius:8px;}
button{padding:10px;border-radius:8px;border:none;cursor:pointer;}
</style>
</head>

<body>

<div id="app" v-cloak class="ui">

<!-- LOGIN -->
<div class="card" v-if="!user">
  <h2 class="font-bold text-lg">Coach Login</h2>

  <input v-model="email" placeholder="Enter email">

  <button @click="sendMagicLink"
          style="background:#2563eb;color:white;margin-top:10px;width:100%;">
    Send Login Link
  </button>
</div>

<!-- LOGGED IN -->
<div v-else class="card">
  <div class="flex justify-between">
    <div>Logged in as: <b>{{ user.email }}</b></div>
    <button @click="logout" style="background:black;color:white;">Logout</button>
  </div>
</div>

<!-- WORKOUT EDITOR -->
<div v-if="user" class="card">
  <h2 class="font-bold text-lg">Workout Editor</h2>

  <input v-model="title" placeholder="Workout title">
  <input v-model="group" placeholder="Group / Set">
  <textarea v-model="input" rows="10"></textarea>

  <button @click="saveWorkout"
          style="background:green;color:white;margin-top:10px;width:100%;">
    Save Workout
  </button>
</div>

<!-- WORKOUT FEED -->
<div v-if="user" class="card">
  <h2 class="font-bold text-lg">Shared Workouts</h2>

  <div v-for="w in workouts" :key="w.id"
       class="card" style="border:1px solid #eee;cursor:pointer"
       @click="loadWorkout(w)">

    <b>{{ w.title }}</b>
    <div style="font-size:12px;opacity:0.7;">
      {{ w.group_name }} • {{ w.coach_name }}
    </div>
  </div>
</div>

</div>

<script>
const {createApp,ref,onMounted} = Vue;

// 🔥 SUPABASE CONNECTION
const SUPABASE_URL = "https://nzrzcbxxqxwktocrmplg.supabase.co";
const SUPABASE_KEY = "sb_publishable_IENWSv_n2kZ1yR2-VmV8ew_pljwvLdt";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

createApp({
setup(){

const email = ref("");
const user = ref(null);

const title = ref("");
const group = ref("");
const input = ref("");
const workouts = ref([]);

// 🔐 LOGIN (EMAIL MAGIC LINK)
async function sendMagicLink(){
  const { error } = await supabaseClient.auth.signInWithOtp({
    email: email.value,
    options: {
      emailRedirectTo: window.location.origin
    }
  });

  if(error) alert(error.message);
  else alert("Check your email for login link");
}

// 🚪 LOGOUT
async function logout(){
  await supabaseClient.auth.signOut();
  user.value = null;
}

// 💾 SAVE WORKOUT
async function saveWorkout(){
  if(!user.value){
    alert("Login first");
    return;
  }

  const { error } = await supabaseClient.from("workouts").insert([{
    title: title.value,
    group_name: group.value,
    content: input.value,
    coach_name: user.value.email,
    team_id: "SOFLO",
    total_yards: 0
  }]);

  if(error) alert(error.message);
  else {
    alert("Saved!");
    loadWorkouts();
  }
}

// 📥 LOAD WORKOUTS
async function loadWorkouts(){
  const { data, error } = await supabaseClient
    .from("workouts")
    .select("*")
    .order("created_at", { ascending: false });

  if(!error) workouts.value = data;
}

// 📂 LOAD ONE WORKOUT
function loadWorkout(w){
  title.value = w.title;
  group.value = w.group_name;
  input.value = w.content;
}

// 🔁 SESSION RESTORE
onMounted(async () => {
  const { data } = await supabaseClient.auth.getSession();
  user.value = data.session?.user || null;

  supabaseClient.auth.onAuthStateChange((_, session) => {
    user.value = session?.user || null;
    if(user.value) loadWorkouts();
  });

  loadWorkouts();
});

return {
  email,user,title,group,input,workouts,
  sendMagicLink,logout,saveWorkout,loadWorkout
};

}
}).mount("#app");
</script>

</body>
</html>
