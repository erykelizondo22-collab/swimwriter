<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swim Engine Pro | SOFLO</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none; }
        .tab-active { border-bottom: 3px solid #3b82f6; color: #3b82f6; }
        
        /* Professional PDF Styles */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; padding: 0; font-family: 'Helvetica', 'Arial', sans-serif; }
            .print-header { display: block !important; border-bottom: 2px solid black; margin-bottom: 20px; padding-bottom: 10px; }
            .set-block { border: none !important; background: transparent !important; margin-bottom: 15px !important; padding: 0 !important; page-break-inside: avoid; }
            .text-emerald-400, .text-blue-500, .text-slate-200, .text-blue-400 { color: black !important; }
            .bg-[#1e293b], .bg-[#0f172a] { background: transparent !important; }
            .border-slate-800 { border-color: #eee !important; }
        }
        .print-header { display: none; }
    </style>
</head>

<body class="bg-[#0f172a] text-slate-200 p-4 font-sans antialiased">
    <div id="app" class="max-w-xl mx-auto pb-24" v-cloak>
        
        <nav class="flex justify-between items-center mb-6 no-print border-b border-slate-800 pb-2">
            <div class="flex space-x-5 text-[10px] font-black uppercase tracking-widest">
                <button @click="view = 'editor'" :class="{'tab-active': view === 'editor'}" class="pb-2">Editor</button>
                <button @click="view = 'history'" :class="{'tab-active': view === 'history'}" class="pb-2">Workouts</button>
            </div>
            <div class="text-[10px] font-bold text-slate-600 uppercase italic">SOFLO PRO ENGINE</div>
        </nav>

        <div class="print-header">
            <div class="flex justify-between items-end">
                <div>
                    <h1 class="text-2xl font-bold uppercase">{{ workoutName || 'Daily Training' }}</h1>
                    <p class="text-sm">{{ todayDate }} — 25 Yards</p>
                </div>
                <div class="text-right text-sm">
                    <p>100 Base Pace: {{ baseInterval }}</p>
                    <p class="font-bold">Total Volume: {{ totalYds }} Yards</p>
                </div>
            </div>
        </div>

        <div v-if="view === 'editor'">
            <div class="bg-[#1e293b] p-5 rounded-3xl mb-6 border border-slate-700/50 shadow-2xl no-print">
                <div class="flex justify-between items-start mb-4">
                    <input v-model="workoutName" class="bg-transparent text-xl font-black text-blue-500 outline-none w-full uppercase tracking-tighter" placeholder="SESSION NAME">
                    <div class="text-right shrink-0 leading-none">
                        <div class="text-2xl font-mono font-bold text-emerald-400">{{ totalYds }}y</div>
                        <div class="text-[10px] font-black text-blue-400 uppercase mt-1 italic">Ends: {{ practiceEndTime }}</div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="flex flex-col">
                        <label class="text-
