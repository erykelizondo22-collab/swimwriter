<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3144/3144573.png">
    <title>Swim Pro Engine</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [v-cloak] { display: none !important; }
        :root { --scale: 1.0; }
        body { background: #f8fafc; font-family: system-ui; margin: 0; }
        
        /* THE FIX: All scaling happens in this one container */
        #print-sheet {
            width: 8.5in;
            min-height: 11in;
            padding: 1in; /* 1" PRECISION MARGINS */
            background: white;
            box-sizing: border-box;
            font-size: calc(14px * var(--scale)) !important;
            line-height: 1.1;
        }

        @media print {
            .no-print { display: none !important; }
            @page { size: letter; margin: 0; }
            body { background: white; }
            #print-sheet { box-shadow: none; margin: 0; }
        }

        /* Set Hierarchy */
        .section-header { font-size: 1.4em; font-weight: 800; border-bottom: 2px solid #000; margin: 1em 0 0.4em; text-transform: uppercase; }
        .set-line { border-bottom: 1px solid #f0f0f0; padding: 2px 0; display: flex; justify-content: space-between; align-items: center; }
        .qty-dist { font-size: 2.2em; font-weight: 900; letter-spacing: -0.05em; }
        .clock-yds { text-align: right; font-weight: 800; font-family: monospace; }
        
        /* Mobile UI */
        .fit-slider { -webkit-appearance: none; width: 100%; height: 12px; border-radius: 10px; background: #cbd5e1; outline: none; }
        .fit-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 30px; height: 30px; border-radius: 50%; background: #2563eb; border: 3px solid white; }
    </style>
</head>
<body>
    <div id="app" v-cloak :style="{'--scale': fitMultiplier}">
        <nav class="no-print bg-slate-900 text-white p-4 flex justify-between items-center sticky top-0 z-50">
            <span class="text-xs font-black tracking-widest uppercase">Swim Pro Engine</span>
            <div class="text-[10px] bg-blue-600 px-2 py-1 rounded">{{ activeTeam }} | {{ activeGroup }}</div>
        </nav>

        <div v-if="view === 'editor'" class="no-print max-w-xl mx-auto p-4 space-y-4">
            <div class="bg-white rounded-3xl p-6 shadow-xl border">
                <input v-model="workoutName" class="text-2xl font-black w-full outline-none uppercase mb-4" placeholder="Practice Title">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div><label class="text-[9px] font-bold text-slate-400 uppercase">Start</label><input type="time" v-model="startTime" class="w-full border rounded-lg p-2 font-bold text-blue-600"></div>
                    <div><label class="text-[9px] font-bold text-slate-400 uppercase">Base</label><select v-model="basePace" class="w-full border rounded-lg p-2 font-bold"><option v-for="p in paces" :key="p" :value="p">{{p}}</option></select></div>
                </div>
                <div class="border-t pt-4">
                    <label class="text-[10px] font-black text-blue-600 uppercase">Scale: {{ fitMultiplier }}</label>
                    <input type="range" min="0.4" max="1.1" step="0.05" v-model="fitMultiplier" class="fit-slider mt-2">
                </div>
            </div>
            <textarea v-model="input" class="w-full h-64 bg-white border p-5 rounded-2xl font-mono text-sm outline-none" placeholder="Warmup:&#10;4x100 @ 1:45..."></textarea>
            <button @click="window.print()" class="w-full bg-emerald-600 text-white p-4 rounded-xl font-black uppercase shadow-lg">Print (1" Margins)</button>
        </div>

        <div id="print-sheet" class="mx-auto mt-4 shadow-2xl">
            <div class="flex justify-between items-end border-b-[8px] border-black pb-2 mb-6">
                <div class="w-3/4"><h1 class="text-4xl font-black uppercase leading-none">{{ workoutName }}</h1><div class="text-[10px] font-bold text-slate-500">{{ date }}</div></div>
                <div class="text-right font-black text-5xl">{{ totalYds }}y</div>
            </div>

            <div v-for="section in parsedWorkout" :key="section.title">
                <div class="section-header flex justify-between items-end">
                    <span>{{ section.title }}</span>
                    <span class="text-[10px] font-bold text-slate-400">{{ section.yds }}y Total</span>
                </div>
                <div v-for="set in section.sets" :key="set.id" class="set-line">
                    <div class="flex items-center gap-4">
                        <div v-if="set.isRest" class="italic text-blue-600 font-bold uppercase">Rest: {{ set.val }}</div>
                        <div v-else>
                            <span class="qty-dist">{{ set.qty }} x {{ set.dist }}</span>
                            <span class="text-slate-400 font-bold ml-2">@ {{ set.pace }}</span>
                            <div v-if="set.note" class="text-blue-600 uppercase font-bold text-[0.8em]">{{ set.note }}</div>
                        </div>
                    </div>
                    <div class="clock-yds"><div>{{ set.time }}</div><div class="text-[0.6em] text-slate-400">{{ set.runYds }}y</div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed } = Vue;
        createApp({
            setup() {
                const input = ref("Warmup:\n4x100 @ 1:45\n4x75 @ 1:18.75\n4x50 @ 0:52.5");
                const workoutName = ref("Daily Practice");
                const startTime = ref("17:45");
                const basePace = ref("1:45");
                const fitMultiplier = ref(0.8);
                const paces = ['1:30','1:45','2:00'];
                const date = new Date().toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: '2-digit', year: '2-digit' });

                const parsedWorkout = computed(() => {
                    let yAcc = 0; let mClock = (parseInt(startTime.value.split(':')[0])*3600)+(parseInt(startTime.value.split(':')[1])*60);
                    const lines = input.value.split('\n').filter(l => l.trim() !== "");
                    let sections = []; let curSec = { title: "Session", sets: [], yds: 0 };

                    lines.forEach(l => {
                        if(l.includes(':')) {
                            if(curSec.sets.length) sections.push(curSec);
                            curSec = { title: l.replace(':',''), sets: [], yds: 0 };
                        } else {
                            const qm = l.match(/(\d+)x(\d+)/i) || [null, 1, 100];
                            const qty = parseInt(qm[1]); const dist = parseInt(qm[2]);
                            yAcc += (qty * dist); curSec.yds += (qty * dist); mClock += (qty * 105);
                            const h = Math.floor(mClock / 3600) % 12 || 12; const m = Math.floor((mClock % 3600) / 60);
                            curSec.sets.push({ qty, dist, pace: '1:45', time: `${h}:${m.toString().padStart(2,'0')} pm`, runYds: yAcc, note: l.includes('/') ? l : '' });
                        }
                    });
                    sections.push(curSec);
                    return sections;
                });

                return { input, workoutName, startTime, basePace, fitMultiplier, paces, date, parsedWorkout, totalYds: computed(() => parsedWorkout.value.reduce((a,b)=>a+b.yds, 0)), view: ref('editor'), activeTeam: 'SOFLO', activeGroup: 'Elite' };
            }
        }).mount('#app');
    </script>
</body>
</html>
