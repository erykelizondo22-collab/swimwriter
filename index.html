<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swim Master v19 ONE PAGE LOCK</title>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
[v-cloak]{display:none!important;}

:root{
--fit:0.75;
--m-lock:0.75in;
}

body{
background:#f1f5f9;
font-family:Inter,system-ui;
margin:0;
}

/* PRINT SHEET */
#render-sheet{
width:8.5in;
min-height:11in;
padding:var(--m-lock);
margin:1rem auto;
background:#fff;
box-shadow:0 30px 80px rgba(0,0,0,.15);
font-size:calc(16px * var(--fit));
overflow:hidden;
}

/* PRINT FORCE FIT */
@media print{
.no-print{display:none!important;}
@page{margin:0;}
#render-sheet{
margin:0;
box-shadow:none;
position:absolute;
top:0;
left:0;
}
}

/* TYPO */
.h-main{font-size:3.5em;font-weight:900;line-height:1;}
.s-head{font-weight:900;border-bottom:3px solid #000;margin-top:1em;padding-bottom:2px;}
.set-row{display:flex;justify-content:space-between;border-bottom:1px solid #eee;padding:3px 0;}
.qty{font-size:1.6em;font-weight:900;}
.clk{font-family:monospace;font-weight:900;font-size:.9em;}

/* DASH */
.ui{
max-width:1400px;
margin:10px auto;
display:grid;
grid-template-columns:2fr 1fr;
gap:12px;
padding:10px;
}

.panel{
background:#fff;
padding:15px;
border-radius:20px;
}

.side{
background:#000;
color:#fff;
padding:15px;
border-radius:20px;
}
</style>
</head>

<body>

<div id="app" v-cloak :style="{'--fit':fit}">

<div class="ui no-print">

<!-- EDITOR -->
<div class="panel space-y-3">

<input v-model="title" class="text-2xl font-black w-full border-b p-1">

<div class="grid grid-cols-4 gap-2 text-xs">

<input v-model="team" placeholder="Team" class="border p-2">
<input v-model="group" placeholder="Group" class="border p-2">

<input type="time" v-model="start" class="border p-2">
<select v-model="base" class="border p-2">
<option disabled value="">Base</option>
<option>1:15</option><option>1:20</option><option>1:30</option>
<option>1:40</option><option>1:45</option><option>2:00</option>
</select>

</div>

<div class="text-xs">
Scale {{Math.round(fit*100)}}%
<input type="range" min="0.3" max="1.2" step="0.01" v-model="fit">
</div>

<textarea v-model="input" class="w-full h-[420px] border p-2 font-mono text-xs"></textarea>

<button @click="print" class="bg-black text-white w-full p-3">PRINT</button>

</div>

<!-- SIDE -->
<div class="side space-y-4 text-xs">

<div class="text-center">
<div class="opacity-60">TOTAL</div>
<div class="text-5xl font-black">{{yards}}y</div>
<div>{{duration}} min</div>
</div>

<div v-for="sec in parsed">

<div class="flex justify-between font-bold uppercase">
<div>
<div>{{sec.title}}</div>
<div class="opacity-40 text-[10px]">{{sec.purpose}}</div>
</div>
<div>{{sec.y}}y</div>
</div>

<div v-for="b in sec.blocks">
<div v-for="s in b.sets" class="flex justify-between text-[10px]">
<div>{{s.q}}x{{s.d}}</div>
<div class="font-bold">{{s.run}}y</div>
</div>
</div>

</div>

</div>

</div>

<!-- PRINT -->
<div id="render-sheet">

<div class="flex justify-between border-b-4 pb-2 mb-3">

<div>
<div class="h-main">{{title}}</div>
<div class="text-xs font-bold">{{team}} — {{group}}</div>
</div>

<div class="text-right">
<div class="text-4xl font-black">{{yards}}y</div>
<div class="text-xs">{{duration}} min</div>
</div>

</div>

<div v-for="sec in parsed">

<div class="s-head flex justify-between">

<div>
<div class="font-black">{{sec.title}}</div>
<div class="text-[9px] opacity-40">{{sec.purpose}}</div>
</div>

<div class="font-black">{{sec.y}}y</div>

</div>

<div v-for="b in sec.blocks">

<div v-for="s in b.sets" class="set-row">

<div>
<div class="qty">
{{s.q}}x{{s.d}} @ {{s.p}}
</div>
<div class="text-[9px]">{{s.note}}</div>
</div>

<div class="clk">
{{s.time}}<br>
{{s.run}}y
</div>

</div>

</div>

</div>

</div>

</div>

<script>
const {createApp,ref,computed,nextTick}=Vue;

function purpose(t){
t=t.toLowerCase();
if(t.includes('warm'))return"Aerobic Prep";
if(t.includes('main'))return"Primary Work";
if(t.includes('kick'))return"Kick Set";
if(t.includes('pull'))return"Pull";
if(t.includes('sprint'))return"Speed";
if(t.includes('cool'))return"Recovery";
return"Work";
}

createApp({
setup(){

const title=ref("SESSION");
const team=ref("TEAM");
const group=ref("GROUP");

const start=ref("");
const base=ref("");

const fit=ref(0.75);

const input=ref(`WARMUP:
4x100 free
4x50 kick
2:00

MAIN:
2x
4x200 @ 2:40
6x100 @ 1:20`);

function parseTime(t){
let [m,s]=t.split(':').map(Number);
return m*60+s;
}

function clock(sec){
let h24=Math.floor(sec/3600);
let h=h24%12||12;
let m=Math.floor(sec%3600/60);
let s=sec%60;
let ap=h24>=12?'pm':'am';
return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')} ${ap}`;
}

const parsed=computed(()=>{

if(!start.value||!base.value){
return[{title:"SET START + BASE",purpose:"Required inputs",blocks:[],y:0}];
}

let baseSec=parseTime(base.value);

let out=[];
let cur={title:"PRACTICE",purpose:"",blocks:[],y:0};
let y=0;

let [sh,sm]=start.value.split(':').map(Number);
let t=sh*3600+sm*60;

let lines=input.value.split('\n').map(l=>l.trim()).filter(Boolean);

for(let i=0;i<lines.length;i++){

let l=lines[i];

if(l.endsWith(':')){
if(cur.blocks.length)out.push(cur);
cur={title:l.slice(0,-1),purpose:purpose(l),blocks:[],y:0};
continue;
}

let r=l.match(/^(\d+)x$/i);
if(r){
let rep=+r[1];
let block={sets:[]};
i++;

while(i<lines.length&&!lines[i].endsWith(':')){
let s=parse(lines[i],baseSec);
if(!s){i++;continue;}

s.time=clock(t);

for(let k=0;k<rep;k++){
y+=s.q*s.d;
cur.y+=s.q*s.d;
t+=s.dur*s.q;
}

s.run=y;

block.sets.push(s);
i++;
}

i--;
cur.blocks.push(block);
continue;
}

let s=parse(l,baseSec);
if(!s)continue;

s.time=clock(t);

y+=s.q*s.d;
cur.y+=s.q*s.d;
t+=s.dur*s.q;

s.run=y;

cur.blocks.push({sets:[s]});
}

out.push(cur);

/* 🔥 HARD ONE PAGE FORCE */
nextTick(()=>{
let el=document.getElementById("render-sheet");
let f=1;
fit.value=f;

while(el.scrollHeight>1056 && f>0.2){
f-=0.01;
fit.value=f;
}
});

return out;
});

function parse(str,baseSec){

let r=str.match(/^(\d+):(\d+)$/);
if(r)return{rest:true,q:0,d:0,dur:parseTime(str),label:str};

let m=str.match(/(\d+)x(\d+)/i);
let q=1,d=0;

if(m){q=+m[1];d=+m[2];}
else if(/^\d+/.test(str)){d=parseInt(str);}
else return null;

let i=str.match(/@(\d+):(\d+)/);

let dur=i?parseTime(i[1]+":"+i[2]):Math.round(d/100*baseSec);

let pace=i?`${i[1]}:${i[2]}`:`${Math.floor(dur/60)}:${(dur%60).toString().padStart(2,'0')}`;

let note=str.replace(/(\d+)x(\d+)/i,'').replace(/@\d+:\d+/,'').trim();

return{rest:false,q,d,dur,p:pace,note};
}

const yards=computed(()=>parsed.value.reduce((a,s)=>a+s.y,0));

const duration=computed(()=>{
let t=0;
parsed.value.forEach(s=>{
s.blocks.forEach(b=>{
b.sets.forEach(x=>t+=x.dur*x.q);
});
});
return Math.round(t/60);
});

function print(){window.print();}

return{title,team,group,start,base,fit,input,parsed,yards,duration,print};
}
}).mount("#app");
</script>

</body>
</html>
