<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swim Engine</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 p-4 font-sans antialiased">
    <div id="app" class="max-w-md mx-auto">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h1 class="text-xl font-black text-blue-500 tracking-tighter">SWIM ENGINE</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Pompano Performance</p>
            </div>
            <div class="text-right">
                <div class="text-3xl font-mono font-bold text-emerald-400">{{ totalYds }}<span class="text-xs ml-1 text-slate-500">yds</span></div>
                <div class="text-xs text-slate-400 font-medium">{{ totalMins }} min session</div>
            </div>
        </div>

        <textarea v-model="input" 
            class="w-full h-72 bg-[#1e293b] border border-slate-700 p-4 rounded-2xl font-mono text-sm mb-4 focus:ring-2 focus:ring-blue-500 outline-none shadow-xl"
            placeholder="4 x 100 on 1:30&#10;8 x 50 on :50 @ EN2"></textarea>

        <div class="space-y-3 mb-24">
            <div v-for="set in parsedSets" class="bg-[#1e293b]/50 p-4 rounded-xl flex justify-between items-center border border-slate-800 shadow-sm">
                <div>
                    <div class="font-bold text-blue-400 text-lg">{{ set.qty }} x {{ set.dist }}</div>
                    <div class="text-xs font-bold text-slate-500">Interval: {{ set.interval }}</div>
                </div>
                <div class="text-right">
                    <div class="text-sm font-mono font-bold text-slate-300">{{ set.lineYds }}y</div>
                    <div class="text-[10px] text-slate-500 font-bold uppercase tracking-tighter">{{ set.lineTime }} mins total</div>
                </div>
            </div>
        </div>

        <div class="fixed bottom-6 left-4 right-4 max-w-md mx-auto">
            <button @click="copyToClipboard" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-black text-sm uppercase tracking-widest shadow-2xl active:scale-95 transition-all">
                Copy Workout
            </button>
        </div>
    </div>

    <script>
        const { createApp, ref, computed } = Vue
        createApp({
            setup() {
                const input = ref("4 x 100 on 1:30\n8 x 50 on :50");
                const parsedSets = computed(() => {
                    return input.value.split('\n').filter(l => l.includes('x')).map(line => {
                        const qty = parseInt(line.match(/(\d+)\s*x/)?.[1] || 0);
                        const dist = parseInt(line.match(/x\s*(\d+)/)?.[1] || 0);
                        const intMatch = line.match(/on\s*(\d*:?\d+)/)?.[1] || "0";
                        let sec = 0;
                        if (intMatch.includes(':')) {
                            const [m, s] = intMatch.split(':').map(Number);
                            sec = (m * 60) + s;
                        } else { sec = parseInt(intMatch) || 0; }
                        return {
                            qty, dist, interval: intMatch,
                            lineYds: qty * dist,
                            lineTime: Math.round((qty * sec) / 60)
                        }
                    });
                });
                const totalYds = computed(() => parsedSets.value.reduce((a, s) => a + s.lineYds, 0));
                const totalMins = computed(() => parsedSets.value.reduce((a, s) => a + s.lineTime, 0));
                const copyToClipboard = () => {
                    navigator.clipboard.writeText(input.value);
                    alert("Workout copied to clipboard!");
                };
                return { input, parsedSets, totalYds, totalMins, copyToClipboard }
            }
        }).mount('#app')
    </script>
</body>
</html>
