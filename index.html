<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Swim Coach Platform</title>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
[v-cloak]{display:none}
body{margin:0;font-family:system-ui;background:#f3f4f6}

/* PRINT ONLY WORKOUT */
@media print{
  .no-print{display:none!important;}
  body{background:white;}
  #sheet{box-shadow:none;margin:0;width:100%;}
}

#sheet{
  width:8.5in;
  min-height:11in;
  margin:20px auto;
  background:white;
  padding:0.75in;
  box-shadow:0 10px 40px rgba(0,0,0,.15);
}

.row{display:flex;justify-content:space-between;border-bottom:1px solid #eee;padding:4px 0}
.block-title{font-weight:800;margin-top:10px;border-bottom:2px solid black;text-transform:uppercase}
.mono{font-family:monospace;font-weight:700}
</style>
</head>

<body>
<div id="app" v-cloak>

<!-- LOGIN -->
<div v-if="!user" class="p-10 max-w-md mx-auto bg-white mt-20 rounded-xl shadow">
  <h1 class="text-2xl font-black mb-2">Coach Login</h1>
  <input v-model="email" placeholder="Email" class="border p-3 w-full mb-3 rounded">
  <button @click="login" class="bg-blue-600 text-white w-full p-3 rounded font-bold">
    Send Magic Link
  </button>
</div>

<!-- APP -->
<div v-else>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-4 p-4 no-print max-w-[1400px] mx-auto">

  <!-- EDITOR -->
  <div class="lg:col-span-2 bg-white p-6 rounded-xl shadow space-y-3">

    <div class="flex justify-between">
      <input v-model="title" class="text-2xl font-black w-full border-b uppercase">
      <button @click="logout" class="text-xs text-red-500 font-bold ml-3">LOGOUT</button>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
      <input v-model="team" placeholder="Team" class="border p-2 rounded">
      <input v-model="group" placeholder="Group" class="border p-2 rounded">
      <input type="time" v-model="start" class="border p-2 rounded">
      <select v-model="base" class="border p-2 rounded">
        <option>1:15</option><option>1:20</option><option>1:30</option>
        <option>1:40</option><option>1:45</option><option>2:00</option>
      </select>
    </div>

    <textarea v-model="input" class="w-full h-80 border p-3 font-mono rounded bg-gray-50"></textarea>

    <div class="flex gap-2">
      <button @click="save" class="flex-1 bg-green-600 text-white p-3 rounded font-black">
        SAVE
      </button>
      <button onclick="window.print()" class="bg-black text-white px-5 rounded font-bold">
        PRINT
      </button>
    </div>

  </div>

  <!-- FEED -->
  <div class="space-y-3">

    <div class="bg-black text-white p-6 rounded-xl text-center">
      <div class="text-5xl font-black">{{totalYards}}y</div>
      <div class="text-xs opacity-50">TOTAL YARDS</div>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
      <div class="text-xs font-bold mb-2 opacity-50">WORKOUT FEED</div>

      <div v-for="w in workouts" :key="w.id"
           @click="loadWorkout(w)"
           class="p-2 border rounded mb-2 cursor-pointer hover:bg-gray-100">

        <div class="text-xs font-bold text-blue-600">
          {{w.group}} • {{w.total_yards}}y
        </div>
        <div class="font-bold text-sm uppercase">{{w.title}}</div>

      </div>
    </div>

  </div>
</div>

<!-- PRINT SHEET -->
<div id="sheet">

  <div class="flex justify-between border-b-4 pb-3 mb-5">
    <div>
      <div class="text-3xl font-black uppercase">{{title}}</div>
      <div class="text-xs font-bold">{{team}} — {{group}}</div>
    </div>
    <div class="text-right">
      <div class="text-3xl font-black">{{totalYards}}y</div>
      <div class="text-xs">{{duration}} min</div>
    </div>
  </div>

  <div v-for="sec in parsed" class="mb-6">

    <div class="block-title flex justify-between">
      <span>{{sec.title}}</span>
      <span>{{sec.y}}y</span>
    </div>

    <div v-for="b in sec.blocks">

      <div v-if="b.rep > 1" class="text-xs font-black mt-2">
        {{b.rep}}x ROUND
      </div>

      <div v-for="s in b.sets" class="row">

        <div>
          <div v-if="s.rest" class="opacity-50 font-bold">
            REST {{s.label}}
          </div>

          <div v-else>
            <span class="font-bold">{{s.q}}x{{s.d}}</span>
            <span class="ml-2">@ {{s.p}}</span>
            <span class="ml-2 text-xs opacity-60">{{s.label}}</span>
          </div>
        </div>

        <div class="mono text-right text-xs">
          {{formatTime(s.start)}}<br>
          <span class="opacity-40">{{s.run}}y</span>
        </div>

      </div>

    </div>

  </div>

</div>

</div>
</div>

<script>
const {createApp,ref,computed,onMounted}=Vue;

const supabase = supabaseClient = window.supabase.createClient(
  "https://nzrzcbxxqxwktocrmplg.supabase.co",
  "sb_publishable_IENWSv_n2kZ1yR2-VmV8ew_pljwvLdt"
);

createApp({
setup(){

const user = ref(null);
const email = ref("");

const title=ref("WORKOUT");
const team=ref("SOFLO");
const group=ref("ELITE");
const start=ref("17:00");
const base=ref("1:30");

const input=ref(`Warmup:
400 Free
300 Kick
200 Pull
4x25 @ 0:30 build

Main Set:
2x
4x50 @ 1:00 sprint
100 easy`);

const workouts = ref([]);

// AUTH
async function login(){
  const { error } = await supabase.auth.signInWithOtp({ email: email.value });
  if(error) alert(error.message);
  else alert("Check your email");
}

async function logout(){
  await supabase.auth.signOut();
  location.reload();
}

// SAVE
async function save(){
  const { error } = await supabase.from("workouts").insert({
    title: title.value,
    team_id: "SOFLO",
    group: group.value,
    content: input.value,
    total_yards: totalYards.value,
    coach_name: user.value.email
  });

  if(error) alert(error.message);
  else loadWorkouts();
}

// LOAD FEED
async function loadWorkouts(){
  const { data } = await supabase
    .from("workouts")
    .select("*")
    .order("created_at",{ascending:false})
    .limit(10);

  workouts.value = data || [];
}

// SESSION PERSISTENCE
onMounted(async ()=>{
  const { data } = await supabase.auth.getSession();
  user.value = data?.session?.user || null;
  if(user.value) loadWorkouts();

  supabase.auth.onAuthStateChange((_, session)=>{
    user.value = session?.user || null;
    if(user.value) loadWorkouts();
  });
});

// PARSER
function parseLine(str, baseSec){
  if(/^\d+:\d+$/.test(str.trim()))
    return {rest:true,dur:toSec(str),label:str,q:1,d:0};

  let m=str.match(/(\d+)x(\d+)/i);
  let q=1,d=0;

  if(m){q=+m[1];d=+m[2];}
  else if(/^\d+/.test(str)) d=parseInt(str);
  else return null;

  let match=str.match(/(\d+):(\d+)/);
  let dur = match ? (match[1]*60 + +match[2]) : Math.round((d/100)*baseSec);

  let label=str.replace(/(\d+x\d+|\d+:\d+)/g,"").trim();

  return {rest:false,q,d,dur,label,p:fmt(dur)};
}

function toSec(t){
  let [m,s]=t.split(":").map(Number);
  return m*60+s;
}

function fmt(s){
  return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,"0")}`;
}

// WORKOUT ENGINE
const parsed = computed(()=>{
  if(!start.value || !base.value) return [];

  let baseSec = toSec(base.value);
  let t = toSec(start.value);

  let out=[];
  let sec={title:"WORKOUT",y:0,blocks:[]};
  let runY=0;

  let lines = input.value.split("\n").map(x=>x.trim()).filter(Boolean);

  for(let i=0;i<lines.length;i++){

    let l=lines[i];

    if(l.endsWith(":")){
      if(sec.blocks.length) out.push(sec);
      sec={title:l.slice(0,-1),y:0,blocks:[]};
      continue;
    }

    let r=l.match(/^(\d+)x$/i);

    if(r){
      let rep=+r[1];
      let block={rep,sets:[]};
      i++;

      while(i<lines.length && !lines[i].endsWith(":") && !/^\d+x$/i.test(lines[i])){
        let s=parseLine(lines[i],baseSec);

        if(s){
          for(let k=0;k<rep;k++){
            if(k===0) block.sets.push({...s,start:t});

            if(!s.rest){
              runY+=s.q*s.d;
              sec.y+=s.q*s.d;
              t+=s.dur*s.q;
            } else {
              t+=s.dur;
            }
          }
        }
        i++;
      }
      i--;

      block.sets.forEach(s=>s.run=runY);
      sec.blocks.push(block);
      continue;
    }

    let s=parseLine(l,baseSec);
    if(!s) continue;

    if(!s.rest){
      runY+=s.q*s.d;
      sec.y+=s.q*s.d;
      s.start=t;
      t+=s.dur*s.q;
    } else {
      s.start=t;
      t+=s.dur;
    }

    s.run=runY;
    sec.blocks.push({rep:1,sets:[s]});
  }

  out.push(sec);
  return out;
});

// TOTALS
const totalYards = computed(()=>parsed.value.reduce((a,b)=>a+b.y,0));

const duration = computed(()=>{
  let t=0;
  parsed.value.forEach(s=>{
    s.blocks.forEach(b=>{
      b.sets.forEach(x=>{
        t+=x.dur*(x.q||1);
      });
    });
  });
  return Math.round(t/60);
});

function formatTime(sec){
  let h=Math.floor(sec/3600)%12||12;
  let m=Math.floor((sec%3600)/60);
  let ap=Math.floor(sec/3600)>=12?"pm":"am";
  return `${h}:${m.toString().padStart(2,"0")}${ap}`;
}

async function loadWorkout(w){
  title.value=w.title;
  group.value=w.group;
  input.value=w.content;
}

return {
  email,user,login,logout,
  title,team,group,start,base,input,
  parsed,totalYards,duration,
  workouts,loadWorkout,save,formatTime
};
}
}).mount("#app");
</script>

</body>
</html>
